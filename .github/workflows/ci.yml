name: CI

on:
  push:
    paths-ignore:
      - "**.md"
  schedule:
    # JST 11:00 (UTC 02:00), 月-金
    - cron: "0 2 * * 1-5"

jobs:
  ci:
    name: CI
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          # windows はテストに時間がかかりすぎるため一時的に除外する
          # - windows-2025
          - macos-26
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - run: rustup update stable
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ${{ matrix.os }}
          toolchain: stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # examples の integration test は外部依存 (curl / Docker) を要求するため
      # 別 job (e2e-test) に分離し、ここでは除外する
      - run: cargo test --workspace --exclude http11_client --exclude http11_server

  e2e-test:
    name: e2e-test
    # examples の integration test は curl / Docker daemon が揃っている Linux でのみ実行する
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - run: rustup update stable
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ubuntu-24.04
          toolchain: stable
      - run: cargo test -p http11_client -p http11_server

  slack_notify:
    needs: [ ci, e2e-test ]
    timeout-minutes: 5
    runs-on: ubuntu-slim
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
